<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.cdnfonts.com/css/aquire" rel="stylesheet" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #1a1a1a;
      }

      html,
      body {
        scrollbar-color: rgba(224, 96, 49, 0.98) rgba(0, 0, 0, 0.55);
        scrollbar-width: thin;
      }

      *::-webkit-scrollbar {
        width: 14px;
        height: 14px;
      }

      *::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.55);
      }

      *::-webkit-scrollbar-thumb {
        background: rgba(224, 96, 49, 0.98);
        border-radius: 999px;
        border: 4px solid rgba(0, 0, 0, 0.55);
      }

      *::-webkit-scrollbar-thumb:hover {
        background: rgba(224, 96, 49, 0.92);
      }

      *::-webkit-scrollbar-button {
        height: 18px;
        width: 18px;
        background: rgba(0, 0, 0, 0.55);
      }

      *::-webkit-scrollbar-button:vertical:decrement {
        background:
          linear-gradient(135deg, transparent 50%, rgba(224, 96, 49, 0.98) 50%) 50% 55% / 8px 8px no-repeat,
          rgba(0, 0, 0, 0.55);
      }

      *::-webkit-scrollbar-button:vertical:increment {
        background:
          linear-gradient(-45deg, transparent 50%, rgba(224, 96, 49, 0.98) 50%) 50% 45% / 8px 8px no-repeat,
          rgba(0, 0, 0, 0.55);
      }

      .page {
        min-height: 100%;
        padding: 22px 18px 42px;
        box-sizing: border-box;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }

      .back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border: 1px solid rgba(224, 96, 49, 0.75);
        color: rgba(224, 96, 49, 0.98);
        background: transparent;
        text-decoration: none;
        font-family: "Aquire", "Poppins", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        letter-spacing: 0.12em;
        border-radius: 0;
        position: relative;
        min-width: 160px;
        transition: background 160ms ease, color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      .back-icon {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .back-icon svg {
        width: 22px;
        height: 22px;
      }

      .back-text {
        opacity: 1;
        transition: opacity 160ms ease;
      }

      .back:hover,
      .back:focus-visible {
        background: rgba(224, 96, 49, 0.98);
        color: rgba(255, 255, 255, 0.98);
        border-color: transparent;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        outline: none;
      }

      .back:hover .back-text,
      .back:focus-visible .back-text {
        opacity: 0;
      }

      .back:hover .back-icon,
      .back:focus-visible .back-icon {
        opacity: 1;
      }

      h1 {
        margin: 18px 0 18px;
        text-align: center;
        color: rgba(255, 255, 255, 0.92);
        font-family: "Aquire", "Poppins", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        letter-spacing: 0.12em;
        font-weight: 500;
      }

      .viewer {
        max-width: 980px;
        margin: 0 auto;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.28);
      }

      .download-wrap {
        display: flex;
        justify-content: center;
        margin-top: 18px;
      }

      .download {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 220px;
        padding: 12px 18px;
        border: 1px solid rgba(224, 96, 49, 0.75);
        color: rgba(224, 96, 49, 0.98);
        background: transparent;
        text-decoration: none;
        font-family: "Aquire", "Poppins", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        letter-spacing: 0.12em;
        border-radius: 0;
        position: relative;
        transition: background 160ms ease, color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      .download-icon {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .download-icon svg {
        width: 22px;
        height: 22px;
      }

      .download-text {
        opacity: 1;
        transition: opacity 160ms ease;
      }

      .download:hover,
      .download:focus-visible {
        background: rgba(224, 96, 49, 0.98);
        color: rgba(255, 255, 255, 0.98);
        border-color: transparent;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        outline: none;
      }

      .download:hover .download-text,
      .download:focus-visible .download-text {
        opacity: 0;
      }

      .download:hover .download-icon,
      .download:focus-visible .download-icon {
        opacity: 1;
      }

      .site-footer {
        margin-top: 26px;
        background: #111111;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 32px 0;
      }

      .footer-copy {
        margin: 0;
        text-align: center;
        color: #9ca3af;
        font-family: "Poppins", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 14px;
      }

      .frame {
        width: 100%;
        height: 115vh;
        border: 0;
      }

      @media (max-width: 720px) {
        .frame {
          height: 105vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <a class="back" href="index.html">
          <span class="back-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10.5 19.5L3 12L10.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M3.5 12H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span class="back-text">Return Back</span>
        </a>
      </div>

      <h1>Resume</h1>

      <div class="viewer">
        <iframe class="frame" src="Resume/Deepak%20Deodhar.pdf" title="Resume" loading="lazy"></iframe>
      </div>

      <div class="download-wrap">
        <a class="download" href="Resume/Deepak%20Deodhar.pdf" download>
          <span class="download-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3V14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M5 21H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span class="download-text">Download PDF</span>
        </a>
      </div>
    </div>

    <footer class="site-footer" aria-label="Footer">
      <div class="page" style="min-height:auto; padding-top:0; padding-bottom:0;">
        <p class="footer-copy">© 2026 Deepak Deodhar All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
